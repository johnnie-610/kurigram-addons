name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (current / v0.4.x)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to also checkout v0.3.x

      # ── Build v0.4.x docs ────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install v0.4.x dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build v0.4.x docs
        working-directory: ./docs
        run: npm run build
        env:
          BASE_URL: /kurigram-addons/v0.4

      - name: Stage v0.4.x output
        run: |
          mkdir -p _site/v0.4
          cp -r docs/.output/public/* _site/v0.4/

      # ── Build v0.3.x docs (from last v0.3.x docs commit) ─────
      - name: Checkout v0.3.x docs source
        run: |
          # cf64cbc = last commit before v0.4.0 docs were added
          # Has logo fix (f32aad3) and BASE_URL support (c5a1a4c)
          git checkout cf64cbc -- docs/

      - name: Patch v0.3.x version switcher
        run: |
          # Replace the old VERSIONS array with one that links to v0.4.x
          node -e "
          const fs = require('fs');
          const file = 'docs/src/components/Sidebar.tsx';
          let src = fs.readFileSync(file, 'utf8');

          // Replace VERSIONS array
          src = src.replace(
            /const VERSIONS = \[[\s\S]*?\];/,
            \`const VERSIONS = [
            { label: \"v0.4.1 (latest)\", path: \"/kurigram-addons/v0.4/\" },
            { label: \"v0.3.x\", path: \"/kurigram-addons/\" },
          ];\`
          );

          // Replace currentVersion to use path matching
          src = src.replace(
            /const currentVersion = \(\) => VERSIONS\.find\(\(v\) => v\.latest\)!;/,
            \`const currentVersion = () => {
              if (typeof window === 'undefined') return VERSIONS[1];
              const p = window.location.pathname;
              return VERSIONS.find(v => p.startsWith(v.path)) || VERSIONS[1];
            };\`
          );

          // Replace the button-based dropdown with anchor links
          src = src.replace(
            /<For each=\{VERSIONS\}>[\s\S]*?<\/For>/,
            \`<For each={VERSIONS}>
                {(ver) => (
                  <a
                    href={ver.path}
                    class=\"block w-full text-left px-3 py-1.5 text-[0.7rem] font-mono transition-colors\"
                    classList={{
                      \"text-amber-400 bg-amber-500/10\": ver.path === currentVersion().path,
                      \"text-slate-400 hover:text-amber-300 hover:bg-white/5\": ver.path !== currentVersion().path,
                    }}
                  >
                    {ver.label}
                  </a>
                )}
              </For>\`
          );

          fs.writeFileSync(file, src);
          console.log('✅ Patched v0.3.x Sidebar.tsx with v0.4.x version switcher');
          "



      - name: Install v0.3.x dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build v0.3.x docs
        working-directory: ./docs
        run: npm run build
        env:
          BASE_URL: /kurigram-addons

      - name: Stage v0.3.x output (root level)
        run: |
          # Copy v0.3.x files to site root — skip the v0.4/ directory
          rsync -a --exclude='v0.4' docs/.output/public/ _site/

      # ── Finalization ─────────────────────────────────────────
      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: SPA fallback for v0.4.x
        run: cp _site/v0.4/index.html _site/v0.4/404.html || true

      - name: SPA fallback for v0.3.x
        run: |
          # Only create 404.html if it doesn't already exist
          [ -f _site/404.html ] || cp _site/index.html _site/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
