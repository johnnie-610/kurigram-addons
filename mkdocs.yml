site_name: Kurigram Addons
site_description: "Documentation for PyKeyboard and Pyrogram Patch"
site_url: https://johnnie-610.github.io/kurigram-addons/
repo_url: https://github.com/johnnie-610/kurigram-addons
repo_name: johnnie-610/kurigram-addons
copyright: "© 2025 Kurigram Addons"

nav:
  - Home: index.md
  - Learnings: learnings/index.md
  - Guides:
      - "PyKeyboard Overview": guide/pykeyboard-overview.md
      - "Pyrogram Patch Overview": guide/pyrogram-patch-overview.md
      - "Integration Playbook": guide/integration-playbook.md
  - Tutorials:
      - tutorials/index.md
      - "Build an Adaptive Keyboard": tutorials/build-an-adaptive-keyboard.md
      - "Pyrogram Keyboard Quickstart": tutorials/pyrogram-keyboard-quickstart.md
      - "Instrument Your Bot": tutorials/instrument-your-bot.md
  - API Reference:
      - "PyKeyboard": api/pykeyboard.md
      - "Pyrogram Patch": api/pyrogram_patch.md

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: "Inter"
    code: "Fira Code"
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - header.autohide
    - search.suggest
    - search.highlight
    - announce.dismiss

plugins:
  - search
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_source: true
            heading_level: 2
            docstring_style: google
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-PR0GR4MB0T
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johnnie-610
      name: GitHub
    - icon: fontawesome/brands/telegram
      link: https://t.me/johnnie
      name: Telegram

